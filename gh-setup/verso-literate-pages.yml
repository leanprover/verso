# Generated by: lake exe verso setup-literate
# To update after upgrading Verso, re-run the command above.

name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    # Allows manual deployment from the Actions tab
    workflow_dispatch:

# Permissions required for GitHub Pages deployment:
#   contents:read  — to check out the repository
#   pages:write    — to publish to GitHub Pages
#   id-token:write — for OIDC authentication with the Pages deployment API
#     (GitHub Pages uses short-lived OIDC tokens instead of long-lived secrets)
permissions:
    contents: read
    pages: write
    id-token: write

# Prevent concurrent deployments: if a new push arrives while a deployment
# is in progress, the new one waits (cancel-in-progress: false) rather than
# canceling the running deployment, which could leave the site in a broken state.
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            # leanprover/lean-action handles:
            #   - Installing elan (the Lean version manager)
            #   - Reading lean-toolchain to select the right Lean version
            #   - Caching .lake for faster subsequent builds
            # We disable its default build/test since we only need :literateHtml.
            - uses: leanprover/lean-action@v1
              with:
                  build: false
                  test: false

            - name: Build literate site
              id: build
              run: echo "path=$(lake query :literateHtml)" >> "$GITHUB_OUTPUT"

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ${{ steps.build.outputs.path }}

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
